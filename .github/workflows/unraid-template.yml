name: Build Unraid Template XML

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main
  release:
    types: [published]

jobs:
  build-unraid-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate Unraid template
        run: python3 extras/gen-unraid-template.py

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: unraid-template
          path: extras/unraid-template.xml

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: extras/unraid-template.xml
