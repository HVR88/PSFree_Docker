name: Generate Unraid Template

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unraid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Generate Unraid template
        run: |
          if [ -f extras/gen-unraid-template.py ]; then
            python extras/gen-unraid-template.py
          else
            echo "gen-unraid-template.py not found, skipping"
          fi

      - name: Publish template to unraid_templates repo
        if: github.ref_name == 'main' || github.event_name == 'release'
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/HVR88/unraid_templates.git
          cd unraid_templates
          mkdir -p PSFree_Docker
          cp ../unraid-template.xml PSFree_Docker/unraid-template.xml
          cp ../extras/icon.png PSFree_Docker/icon.png
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add PSFree_Docker
          git diff --cached --quiet || git commit -m "Update PSFree_Docker Unraid template"
          git push

      - name: Upload Unraid template artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unraid-template
          path: unraid-template.xml
          if-no-files-found: ignore

      - name: Attach Unraid template to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: unraid-template.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
