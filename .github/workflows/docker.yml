name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      update_description:
        description: "Update Docker Hub description (writes to Docker Hub)"
        required: false
        default: false
        type: boolean
      preview_description:
        description: "Preview docker_description.md in the run summary and upload as an artifact"
        required: false
        default: true
        type: boolean

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/psfree_docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Read VERSION
        id: ver
        if: github.event_name != 'release'
        run: echo "version=$(cat VERSION | tr -d '\n\r ')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preview Docker Hub description
        if: github.event_name == 'workflow_dispatch' && inputs.preview_description
        run: |
          echo "## Docker Hub Description Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Source: extras/docker_description.md" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "```markdown" >> "$GITHUB_STEP_SUMMARY"
          cat ./extras/docker_description.md >> "$GITHUB_STEP_SUMMARY"
          echo "```" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Docker Hub description (artifact)
        if: github.event_name == 'workflow_dispatch' && inputs.preview_description
        uses: actions/upload-artifact@v4
        with:
          name: dockerhub-description
          path: ./extras/docker_description.md
          if-no-files-found: error

      - name: Update Docker Hub repository overview
        if: github.event_name == 'release' || github.ref_name == 'main' || (github.event_name == 'workflow_dispatch' && inputs.update_description)
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./extras/docker_description.md

      - name: Build and push (amd64+arm64) [branch]
        if: github.event_name != 'release'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            IMAGE_VERSION=${{ steps.ver.outputs.version }}
            IMAGE_REVISION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:develop
            ${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}-dev

      - name: Build and push (amd64+arm64) [release]
        if: github.event_name == 'release'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            IMAGE_VERSION=${{ github.event.release.tag_name }}
            IMAGE_REVISION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}
            ${{ env.IMAGE_NAME }}:latest
